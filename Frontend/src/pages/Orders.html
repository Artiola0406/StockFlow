<!DOCTYPE html>
<html lang="sq" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow — Porositë</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen transition-colors duration-300">
  <div id="navbar-container"></div>
  <main class="lg:ml-64 pt-16 lg:pt-0 p-6">
    <div class="max-w-7xl mx-auto">
      <div class="mb-6 pt-2">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Porositë</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Menaxho porositë e klientëve</p>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="text-2xl font-bold text-blue-500" id="stat-total">0</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Total Porosi</div>
        </div>
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="text-2xl font-bold text-green-500" id="stat-confirmed">0</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Të Konfirmuara</div>
        </div>
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="text-2xl font-bold text-yellow-500" id="stat-pending">0</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Në Pritje</div>
        </div>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800 mb-6">
        <h2 class="font-semibold text-gray-700 dark:text-gray-200 mb-4">➕ Shto Porosi</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Klienti *</label>
            <input id="f-customer" type="text" placeholder="Gent Hoxha" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Produkti *</label>
            <input id="f-product" type="text" placeholder="Laptop Dell XPS" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Sasia *</label>
            <input id="f-quantity" type="number" placeholder="1" min="1" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Totali (€) *</label>
            <input id="f-total" type="number" placeholder="999.99" min="0" step="0.01" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Statusi</label>
            <select id="f-status" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="Ne pritje">⏳ Në pritje</option>
              <option value="Konfirmuar">✅ Konfirmuar</option>
              <option value="Derguar">🚚 Dërguar</option>
              <option value="Anuluar">❌ Anuluar</option>
            </select>
          </div>
        </div>
        <button onclick="addOrder()" class="mt-4 px-6 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition-colors">✅ Shto Porosinë</button>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800">
        <h2 class="font-semibold text-gray-700 dark:text-gray-200 mb-4">🛒 Lista e Porosive</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-800">
                <th class="pb-3 font-medium">Klienti</th>
                <th class="pb-3 font-medium">Produkti</th>
                <th class="pb-3 font-medium">Sasia</th>
                <th class="pb-3 font-medium">Totali</th>
                <th class="pb-3 font-medium">Statusi</th>
                <th class="pb-3 font-medium">Data</th>
                <th class="pb-3 font-medium">Veprimet</th>
              </tr>
            </thead>
            <tbody id="orderBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div id="editModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl">
      <h2 class="font-semibold text-gray-800 dark:text-white mb-4">✏️ Ndrysho Porosinë</h2>
      <input type="hidden" id="edit-id">
      <div class="space-y-3">
        <div><label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Klienti</label>
          <input id="edit-customer" type="text" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div><label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Produkti</label>
          <input id="edit-product" type="text" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Sasia</label>
            <input id="edit-quantity" type="number" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
          <div><label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Totali (€)</label>
            <input id="edit-total" type="number" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
        </div>
        <div><label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Statusi</label>
          <select id="edit-status" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="Ne pritje">⏳ Në pritje</option>
            <option value="Konfirmuar">✅ Konfirmuar</option>
            <option value="Derguar">🚚 Dërguar</option>
            <option value="Anuluar">❌ Anuluar</option>
          </select>
        </div>
      </div>
      <div class="flex gap-3 mt-5">
        <button onclick="saveEdit()" class="flex-1 px-4 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition-colors">💾 Ruaj</button>
        <button onclick="closeModal('editModal')" class="flex-1 px-4 py-2.5 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400 rounded-xl text-sm font-semibold transition-colors">✖ Anulo</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="navbar.js"></script>
  <script>
    renderNavbar('orders');
    const KEY = 'orders';

    function getStatusBadge(status) {
      const map = {
        'Ne pritje': 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 dark:text-yellow-400',
        'Konfirmuar': 'bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400',
        'Derguar': 'bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400',
        'Anuluar': 'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400'
      };
      const labels = { 'Ne pritje': '⏳ Në pritje', 'Konfirmuar': '✅ Konfirmuar', 'Derguar': '🚚 Dërguar', 'Anuluar': '❌ Anuluar' };
      return `<span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${map[status] || 'bg-gray-100 text-gray-500'}">${labels[status] || status}</span>`;
    }

    function render() {
      const data = lsGet(KEY);
      document.getElementById('stat-total').textContent = data.length;
      document.getElementById('stat-confirmed').textContent = data.filter(o => o.status === 'Konfirmuar').length;
      document.getElementById('stat-pending').textContent = data.filter(o => o.status === 'Ne pritje').length;
      const tbody = document.getElementById('orderBody');
      if (data.length === 0) { showEmpty('orderBody', 'Nuk ka porosi.'); return; }
      tbody.innerHTML = [...data].reverse().map(o => `
        <tr class="border-b border-gray-50 dark:border-gray-800 last:border-0 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
          <td class="py-3 font-medium text-gray-800 dark:text-gray-200">${o.customerName}</td>
          <td class="py-3 text-gray-500 dark:text-gray-400">${o.productName}</td>
          <td class="py-3 text-gray-500 dark:text-gray-400">${o.quantity}</td>
          <td class="py-3 font-medium text-green-600 dark:text-green-400">${formatCurrency(o.totalAmount)}</td>
          <td class="py-3">${getStatusBadge(o.status)}</td>
          <td class="py-3 text-gray-500 dark:text-gray-400">${formatDate(o.date)}</td>
          <td class="py-3">
            <div class="flex gap-2">
              <button onclick="openEdit('${o.id}')" class="px-3 py-1.5 bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600 dark:text-yellow-400 rounded-lg text-xs font-medium hover:bg-yellow-100 transition-colors">✏️</button>
              <button onclick="deleteOrder('${o.id}')" class="px-3 py-1.5 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-lg text-xs font-medium hover:bg-red-100 transition-colors">🗑️</button>
            </div>
          </td>
        </tr>`).join('');
    }

    function addOrder() {
      const customerName = document.getElementById('f-customer').value.trim();
      const productName = document.getElementById('f-product').value.trim();
      const quantity = document.getElementById('f-quantity').value;
      const totalAmount = document.getElementById('f-total').value;
      if (!customerName) return showToast('Klienti është i detyrueshëm!', 'error');
      if (!productName) return showToast('Produkti është i detyrueshëm!', 'error');
      if (!quantity || parseInt(quantity) <= 0) return showToast('Sasia duhet të jetë pozitive!', 'error');
      if (!totalAmount || parseFloat(totalAmount) <= 0) return showToast('Totali duhet të jetë pozitiv!', 'error');
      const data = lsGet(KEY);
      data.push({ id: Date.now().toString(), customerName, productName, quantity, totalAmount, status: document.getElementById('f-status').value, date: new Date().toISOString() });
      lsSet(KEY, data);
      showToast('✅ Porosia u shtua!', 'success');
      ['f-customer','f-product','f-quantity','f-total'].forEach(id => document.getElementById(id).value = '');
      render();
    }

    function openEdit(id) {
      const o = lsGet(KEY).find(x => x.id === id);
      document.getElementById('edit-id').value = o.id;
      document.getElementById('edit-customer').value = o.customerName;
      document.getElementById('edit-product').value = o.productName;
      document.getElementById('edit-quantity').value = o.quantity;
      document.getElementById('edit-total').value = o.totalAmount;
      document.getElementById('edit-status').value = o.status;
      openModal('editModal');
    }

    function saveEdit() {
      const id = document.getElementById('edit-id').value;
      const data = lsGet(KEY);
      const i = data.findIndex(x => x.id === id);
      data[i] = { ...data[i], customerName: document.getElementById('edit-customer').value, productName: document.getElementById('edit-product').value, quantity: document.getElementById('edit-quantity').value, totalAmount: document.getElementById('edit-total').value, status: document.getElementById('edit-status').value };
      lsSet(KEY, data);
      closeModal('editModal');
      showToast('✅ Porosia u përditësua!', 'success');
      render();
    }

    function deleteOrder(id) {
      confirmDelete('A jeni i sigurt?', () => {
        lsSet(KEY, lsGet(KEY).filter(x => x.id !== id));
        showToast('✅ Porosia u fshi!', 'success');
        render();
      });
    }

    render();
  </script>
</body>
</html>
