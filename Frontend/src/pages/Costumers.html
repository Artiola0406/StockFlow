<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow — Klientët</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f4f8; }
nav { background: #2d3748; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
nav .logo { color: white; font-size: 20px; font-weight: bold; }
nav .links { display: flex; gap: 4px; flex-wrap: wrap; }
nav a { color: #a0aec0; text-decoration: none; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
nav a:hover { background: #4a5568; color: white; }
nav a.active { background: #4299e1; color: white; }
.container { max-width: 960px; margin: 24px auto; padding: 0 16px; }
.stats { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
.stat-card { background: white; border-radius: 10px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.stat-card .num { font-size: 28px; font-weight: 700; color: #4299e1; }
.stat-card .lbl { font-size: 13px; color: #718096; margin-top: 4px; }
.card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card h2 { color: #2d3748; margin-bottom: 16px; font-size: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid .full { grid-column: 1 / -1; }
label { display: block; font-size: 13px; color: #4a5568; margin-bottom: 4px; }
input { width: 100%; padding: 9px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; }
input:focus { outline: none; border-color: #4299e1; }
.btn { padding: 9px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-blue { background: #4299e1; color: white; width: 100%; margin-top: 12px; }
.btn-yellow { background: #f6c90e; color: #744210; padding: 5px 12px; font-size: 12px; }
.btn-red { background: #fc8181; color: #742a2a; padding: 5px 12px; font-size: 12px; }
.btn-gray { background: #e2e8f0; color: #4a5568; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { background: #edf2f7; padding: 10px 12px; text-align: left; color: #4a5568; }
td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; }
tr:last-child td { border-bottom: none; }
.msg { padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 14px; display: none; }
.msg.show { display: block; }
.success { background: #c6f6d5; color: #276749; }
.error { background: #fed7d7; color: #742a2a; }
.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
.overlay.show { display: flex; }
.modal { background: white; border-radius: 10px; padding: 24px; width: 100%; max-width: 420px; }
.modal h2 { margin-bottom: 16px; }
.modal-btns { display: flex; gap: 8px; margin-top: 12px; }
.modal-btns .btn { flex: 1; }
.actions { display: flex; gap: 6px; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<nav>
<div class="logo">📦 StockFlow</div>
<div class="links">
<a href="Dashboard.html">📊 Dashboard</a>
<a href="Products.html">📦 Produktet</a>
<a href="Warehouses.html">🏭 Depo</a>
<a href="StockMovements.html">🔄 Lëvizjet</a>
<a href="Suppliers.html">🚚 Furnitorët</a>
<a href="Orders.html">🛒 Porositë</a>
<a href="Customers.html" class="active">👥 Klientët</a>
<a href="Reports.html">📈 Raportet</a>
</div>
</nav>

<div class="container">
<div class="stats">
<div class="stat-card">
<div class="num" id="totalCust">0</div>
<div class="lbl">Total Klientë</div>
</div>
</div>

<div class="card">
<h2>➕ Shto Klient</h2>
<div class="msg" id="formMsg"></div>
<div class="form-grid">
<div><label>Emri *</label><input type="text" id="name" placeholder="Gent Hoxha"></div>
<div><label>Email *</label><input type="email" id="email" placeholder="gent@email.com"></div>
<div><label>Telefoni *</label><input type="text" id="phone" placeholder="+383 44 000 000"></div>
<div class="full"><label>Adresa</label><input type="text" id="address" placeholder="Rruga e Diellit, Prishtinë"></div>
</div>
<button class="btn btn-blue" onclick="addCustomer()">✅ Shto Klientin</button>
</div>

<div class="card">
<h2>👥 Lista e Klientëve</h2>
<div class="msg" id="listMsg"></div>
<table>
<thead><tr><th>Emri</th><th>Email</th><th>Telefoni</th><th>Adresa</th><th>Veprimet</th></tr></thead>
<tbody id="custList"></tbody>
</table>
</div>
</div>

<div class="overlay" id="overlay">
<div class="modal">
<h2>✏️ Ndrysho Klientin</h2>
<input type="hidden" id="editId">
<label>Emri</label><input type="text" id="editName" style="margin-bottom:10px">
<label>Email</label><input type="email" id="editEmail" style="margin-bottom:10px">
<label>Telefoni</label><input type="text" id="editPhone" style="margin-bottom:10px">
<label>Adresa</label><input type="text" id="editAddress" style="margin-bottom:10px">
<div class="modal-btns">
<button class="btn btn-blue" onclick="saveEdit()">💾 Ruaj</button>
<button class="btn btn-gray" onclick="closeModal()">✖ Anulo</button>
</div>
</div>
</div>

<script>
const KEY = 'customers';
function getData() { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
function saveData(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function showMsg(id, text, type) {
const el = document.getElementById(id);
el.textContent = text; el.className = 'msg ' + type + ' show';
setTimeout(() => { el.className = 'msg'; }, 3000);
}

function render() {
const data = getData();
document.getElementById('totalCust').textContent = data.length;
const tbody = document.getElementById('custList');
if (data.length === 0) {
tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#a0aec0;padding:20px">Nuk ka klientë.</td></tr>';
return;
}
tbody.innerHTML = data.map(c => `<tr>
<td><strong>${c.name}</strong></td>
<td>${c.email}</td>
<td>${c.phone}</td>
<td>${c.address || '—'}</td>
<td><div class="actions">
<button class="btn btn-yellow" onclick="openEdit('${c.id}')">✏️</button>
<button class="btn btn-red" onclick="deleteCust('${c.id}')">🗑️</button>
</div></td>
</tr>`).join('');
}

function addCustomer() {
const name = document.getElementById('name').value.trim();
const email = document.getElementById('email').value.trim();
const phone = document.getElementById('phone').value.trim();
if (!name) return showMsg('formMsg', '❌ Emri është i detyrueshëm!', 'error');
if (!email) return showMsg('formMsg', '❌ Email është i detyrueshëm!', 'error');
if (!phone) return showMsg('formMsg', '❌ Telefoni është i detyrueshëm!', 'error');
const data = getData();
data.push({ id: Date.now().toString(), name, email, phone, address: document.getElementById('address').value });
saveData(data);
showMsg('formMsg', '✅ Klienti u shtua!', 'success');
['name','email','phone','address'].forEach(id => document.getElementById(id).value = '');
render();
}

function openEdit(id) {
const c = getData().find(x => x.id === id);
document.getElementById('editId').value = c.id;
document.getElementById('editName').value = c.name;
document.getElementById('editEmail').value = c.email;
document.getElementById('editPhone').value = c.phone;
document.getElementById('editAddress').value = c.address || '';
document.getElementById('overlay').classList.add('show');
}

function saveEdit() {
const id = document.getElementById('editId').value;
const data = getData();
const i = data.findIndex(x => x.id === id);
data[i] = { ...data[i], name: document.getElementById('editName').value, email: document.getElementById('editEmail').value, phone: document.getElementById('editPhone').value, address: document.getElementById('editAddress').value };
saveData(data); closeModal();
showMsg('listMsg', '✅ Klienti u përditësua!', 'success');
render();
}

function deleteCust(id) {
if (!confirm('A jeni i sigurt?')) return;
saveData(getData().filter(x => x.id !== id));
showMsg('listMsg', '✅ Klienti u fshi!', 'success');
render();
}

function closeModal() { document.getElementById('overlay').classList.remove('show'); }
render();
</script>
</body>
</html>
