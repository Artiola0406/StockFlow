<!DOCTYPE html>
<html lang="sq" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow — Depot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen transition-colors duration-300">
  <div id="navbar-container"></div>
  <main class="lg:ml-64 pt-16 lg:pt-0 p-6">
    <div class="max-w-7xl mx-auto">
      <div class="mb-6 pt-2 flex justify-between items-center">
        <div>
          <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Depot</h1>
          <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Menaxhimi i depove</p>
        </div>
        <button onclick="openAddModal()" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition-colors">+ Shto Depo</button>
      </div>

      <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-800">
                <th class="pb-3 font-medium">Emri</th>
                <th class="pb-3 font-medium">Lokacioni</th>
                <th class="pb-3 font-medium">Kapaciteti</th>
                <th class="pb-3 font-medium">Statusi</th>
                <th class="pb-3 font-medium"></th>
               </tr>
            </thead>
            <tbody id="warehousesBody"></tbody>
           </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal për shtim/ndryshim -->
  <div id="warehouseModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
    <div class="bg-white dark:bg-gray-900 rounded-2xl max-w-md w-full p-6 shadow-xl">
      <h3 class="text-xl font-bold text-gray-800 dark:text-white mb-4" id="modalTitle">Shto Depo</h3>
      <input type="hidden" id="editId">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Emri *</label>
          <input id="warehouseName" type="text" class="w-full px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Lokacioni</label>
          <input id="warehouseLocation" type="text" class="w-full px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Kapaciteti *</label>
          <input id="warehouseCapacity" type="number" min="0" class="w-full px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800">
        </div>
        <div>
          <label class="flex items-center gap-2">
            <input id="warehouseActive" type="checkbox" checked> <span class="text-sm text-gray-600 dark:text-gray-400">Aktiv</span>
          </label>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg">Anulo</button>
        <button onclick="saveWarehouse()" class="px-4 py-2 bg-blue-500 text-white rounded-lg">Ruaj</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="navbar.js"></script>
  <script>
    renderNavbar('warehouses');
    const STORAGE_KEY = 'warehouses';

    function loadWarehouses() {
      const data = lsGet(STORAGE_KEY);
      const tbody = document.getElementById('warehousesBody');
      if (data.length === 0) {
        showEmpty('warehousesBody', 'Nuk ka depo të regjistruara.');
        return;
      }
      tbody.innerHTML = data.map(w => `
        <tr class="border-b border-gray-50 dark:border-gray-800 last:border-0">
          <td class="py-3 font-medium">${escapeHtml(w.name)}</td>
          <td class="py-3 text-gray-500">${escapeHtml(w.location || '—')}</td>
          <td class="py-3">${w.capacity}</td>
          <td class="py-3"><span class="px-2 py-0.5 rounded-full text-xs ${w.isActive ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">${w.isActive ? 'Aktiv' : 'Jo aktiv'}</span></td>
          <td class="py-3">
            <button onclick="editWarehouse('${w.id}')" class="text-blue-500 hover:text-blue-600 mr-2">✏️</button>
            <button onclick="deleteWarehouse('${w.id}')" class="text-red-500 hover:text-red-600">🗑️</button>
          </td>
        </tr>
      `).join('');
    }

    function openAddModal() {
      document.getElementById('modalTitle').innerText = 'Shto Depo';
      document.getElementById('editId').value = '';
      document.getElementById('warehouseName').value = '';
      document.getElementById('warehouseLocation').value = '';
      document.getElementById('warehouseCapacity').value = '';
      document.getElementById('warehouseActive').checked = true;
      document.getElementById('warehouseModal').classList.remove('hidden');
      document.getElementById('warehouseModal').style.display = 'flex';
    }

    function editWarehouse(id) {
      const warehouses = lsGet(STORAGE_KEY);
      const w = warehouses.find(x => x.id === id);
      if (w) {
        document.getElementById('modalTitle').innerText = 'Ndrysho Depo';
        document.getElementById('editId').value = w.id;
        document.getElementById('warehouseName').value = w.name;
        document.getElementById('warehouseLocation').value = w.location || '';
        document.getElementById('warehouseCapacity').value = w.capacity;
        document.getElementById('warehouseActive').checked = w.isActive !== false;
        document.getElementById('warehouseModal').classList.remove('hidden');
        document.getElementById('warehouseModal').style.display = 'flex';
      }
    }

    function saveWarehouse() {
      const name = document.getElementById('warehouseName').value.trim();
      const capacity = parseInt(document.getElementById('warehouseCapacity').value);
      if (!name) return showToast('Emri i depose është i detyrueshëm', 'error');
      if (isNaN(capacity) || capacity < 0) return showToast('Kapaciteti duhet të jetë numër jo negativ', 'error');

      const warehouses = lsGet(STORAGE_KEY);
      const editId = document.getElementById('editId').value;
      if (editId) {
        const index = warehouses.findIndex(w => w.id === editId);
        if (index !== -1) {
          warehouses[index] = {
            ...warehouses[index],
            name,
            location: document.getElementById('warehouseLocation').value.trim(),
            capacity,
            isActive: document.getElementById('warehouseActive').checked
          };
          lsSet(STORAGE_KEY, warehouses);
          showToast('Depo u përditësua', 'success');
        }
      } else {
        const newWarehouse = {
          id: Date.now().toString(),
          name,
          location: document.getElementById('warehouseLocation').value.trim(),
          capacity,
          isActive: document.getElementById('warehouseActive').checked
        };
        warehouses.push(newWarehouse);
        lsSet(STORAGE_KEY, warehouses);
        showToast('Depo u shtua', 'success');
      }
      closeModal();
      loadWarehouses();
    }

    function deleteWarehouse(id) {
      confirmDelete('A jeni i sigurt që doni ta fshini këtë depo?', () => {
        const warehouses = lsGet(STORAGE_KEY).filter(w => w.id !== id);
        lsSet(STORAGE_KEY, warehouses);
        showToast('Depo u fshi', 'success');
        loadWarehouses();
      });
    }

    function closeModal() {
      const modal = document.getElementById('warehouseModal');
      modal.classList.add('hidden');
      modal.style.display = 'none';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    loadWarehouses();
  </script>
</body>
</html>
