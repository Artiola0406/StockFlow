<!DOCTYPE html>
<html lang="sq" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow — Produktet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen transition-colors duration-300">
  <div id="navbar-container"></div>

  <main class="lg:ml-64 pt-16 lg:pt-0 p-6">
    <div class="max-w-7xl mx-auto">

      <!-- Header -->
      <div class="mb-6 pt-2">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Produktet</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Menaxho produktet dhe inventarin</p>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="text-2xl font-bold text-blue-500" id="stat-total">—</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Produkte Gjithsej</div>
        </div>
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="text-2xl font-bold text-green-500" id="stat-value">—</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Vlera Totale</div>
        </div>
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="text-2xl font-bold text-red-500" id="stat-low">—</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Stok i Ulët</div>
        </div>
      </div>

      <!-- Add Product Form -->
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800 mb-6">
        <h2 class="font-semibold text-gray-700 dark:text-gray-200 mb-4">➕ Shto Produkt të Ri</h2>
        <div id="formMsg"></div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Emri *</label>
            <input id="f-name" type="text" placeholder="Emri i produktit" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">SKU *</label>
            <input id="f-sku" type="text" placeholder="SKU-007" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Çmimi (€) *</label>
            <input id="f-price" type="number" placeholder="0.00" min="0" step="0.01" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Sasia *</label>
            <input id="f-quantity" type="number" placeholder="0" min="0" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Kategoria</label>
            <input id="f-category" type="text" placeholder="Elektronikë, Mobilje..." class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div class="flex items-end">
            <button onclick="addProduct()" class="w-full px-4 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition-colors">
              ✅ Shto Produktin
            </button>
          </div>
        </div>
      </div>

      <!-- Product List -->
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
          <h2 class="font-semibold text-gray-700 dark:text-gray-200">📋 Lista e Produkteve</h2>
          <div class="flex gap-2">
            <input id="searchInput" type="text" placeholder="Kërko..." onkeyup="loadProducts()" class="px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-48">
            <button onclick="loadProducts()" class="px-3 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-medium transition-colors">🔍</button>
            <button onclick="document.getElementById('searchInput').value=''; loadProducts()" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400 rounded-xl text-sm font-medium transition-colors">✖</button>
          </div>
        </div>
        <div id="listMsg"></div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-800">
                <th class="pb-3 font-medium">Emri</th>
                <th class="pb-3 font-medium">SKU</th>
                <th class="pb-3 font-medium">Çmimi</th>
                <th class="pb-3 font-medium">Sasia</th>
                <th class="pb-3 font-medium">Kategoria</th>
                <th class="pb-3 font-medium">Veprimet</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div id="editModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl">
      <h2 class="font-semibold text-gray-800 dark:text-white mb-4">✏️ Përditëso Produktin</h2>
      <input type="hidden" id="edit-id">
      <div class="space-y-3">
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Emri</label>
          <input id="edit-name" type="text" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">SKU</label>
          <input id="edit-sku" type="text" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Çmimi (€)</label>
            <input id="edit-price" type="number" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Sasia</label>
            <input id="edit-quantity" type="number" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Kategoria</label>
          <input id="edit-category" type="text" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>
      <div class="flex gap-3 mt-5">
        <button onclick="saveUpdate()" class="flex-1 px-4 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition-colors">💾 Ruaj</button>
        <button onclick="closeModal('editModal')" class="flex-1 px-4 py-2.5 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400 rounded-xl text-sm font-semibold transition-colors">✖ Anulo</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="navbar.js"></script>
  <script>
    renderNavbar('products');

    async function loadProducts() {
      const filter = document.getElementById('searchInput').value;
      const url = filter ? `/products?filter=${encodeURIComponent(filter)}` : '/products';
      try {
        showLoading('productTableBody');
        const data = await apiGet(url);
        const products = data.data || [];

        document.getElementById('stat-total').textContent = products.length;
        document.getElementById('stat-value').textContent = formatCurrency(
          products.reduce((s, p) => s + parseFloat(p.price) * parseInt(p.quantity), 0)
        );
        document.getElementById('stat-low').textContent = products.filter(p => parseInt(p.quantity) < 5).length;

        const tbody = document.getElementById('productTableBody');
        if (products.length === 0) {
          showEmpty('productTableBody', 'Nuk ka produkte.');
          return;
        }
        tbody.innerHTML = products.map(p => `
          <tr class="border-b border-gray-50 dark:border-gray-800 last:border-0 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
            <td class="py-3 font-medium text-gray-800 dark:text-gray-200">${p.name}</td>
            <td class="py-3"><code class="px-2 py-0.5 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 rounded-lg text-xs">${p.sku}</code></td>
            <td class="py-3 font-medium text-green-600 dark:text-green-400">${formatCurrency(p.price)}</td>
            <td class="py-3">
              <span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${parseInt(p.quantity) < 5 ? 'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400' : 'bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400'}">${p.quantity}</span>
            </td>
            <td class="py-3"><span class="px-2.5 py-0.5 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-full text-xs font-medium">${p.category}</span></td>
            <td class="py-3">
              <div class="flex gap-2">
                <button onclick="openEdit('${p.id}','${p.name}','${p.sku}','${p.price}','${p.quantity}','${p.category}')" class="px-3 py-1.5 bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600 dark:text-yellow-400 rounded-lg text-xs font-medium hover:bg-yellow-100 dark:hover:bg-yellow-900/40 transition-colors">✏️ Ndrysho</button>
                <button onclick="deleteProduct('${p.id}','${p.name}')" class="px-3 py-1.5 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-lg text-xs font-medium hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors">🗑️ Fshi</button>
              </div>
            </td>
          </tr>`).join('');
      } catch (e) {
        showEmpty('productTableBody', '❌ Serveri nuk është aktiv!');
      }
    }

    async function addProduct() {
      const name = document.getElementById('f-name').value.trim();
      const sku = document.getElementById('f-sku').value.trim();
      const price = document.getElementById('f-price').value;
      const quantity = document.getElementById('f-quantity').value;
      const category = document.getElementById('f-category').value.trim();

      if (!name) return showToast('Emri është i detyrueshëm!', 'error');
      if (!sku) return showToast('SKU është i detyrueshëm!', 'error');
      if (!price || parseFloat(price) <= 0) return showToast('Çmimi duhet të jetë > 0!', 'error');
      if (quantity === '' || parseInt(quantity) < 0) return showToast('Sasia nuk mund të jetë negative!', 'error');

      try {
        const res = await apiPost('/products', { name, sku, price, quantity, category: category || 'E pacaktuar' });
        if (res.success) {
          showToast('✅ Produkti u shtua me sukses!', 'success');
          ['f-name','f-sku','f-price','f-quantity','f-category'].forEach(id => document.getElementById(id).value = '');
          loadProducts();
        } else {
          showToast('❌ ' + res.message, 'error');
        }
      } catch (e) {
        showToast('❌ Gabim në server!', 'error');
      }
    }

    function openEdit(id, name, sku, price, quantity, category) {
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-name').value = name;
      document.getElementById('edit-sku').value = sku;
      document.getElementById('edit-price').value = price;
      document.getElementById('edit-quantity').value = quantity;
      document.getElementById('edit-category').value = category;
      openModal('editModal');
    }

    async function saveUpdate() {
      const id = document.getElementById('edit-id').value;
      const data = {
        name: document.getElementById('edit-name').value,
        sku: document.getElementById('edit-sku').value,
        price: document.getElementById('edit-price').value,
        quantity: document.getElementById('edit-quantity').value,
        category: document.getElementById('edit-category').value
      };
      try {
        const res = await apiPut(`/products/${id}`, data);
        if (res.success) {
          closeModal('editModal');
          showToast('✅ Produkti u përditësua!', 'success');
          loadProducts();
        } else {
          showToast('❌ ' + res.message, 'error');
        }
      } catch (e) {
        showToast('❌ Gabim!', 'error');
      }
    }

    async function deleteProduct(id, name) {
      confirmDelete(`A jeni i sigurt që doni të fshini "${name}"?`, async () => {
        try {
          const res = await apiDelete(`/products/${id}`);
          if (res.success) {
            showToast('✅ Produkti u fshi!', 'success');
            loadProducts();
          } else {
            showToast('❌ ' + res.message, 'error');
          }
        } catch (e) {
          showToast('❌ Gabim!', 'error');
        }
      });
    }

    loadProducts();
  </script>
</body>
</html>
