<!DOCTYPE html>
<html lang="sq" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow — Lëvizjet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen transition-colors duration-300">
  <div id="navbar-container"></div>
  <main class="lg:ml-64 pt-16 lg:pt-0 p-6">
    <div class="max-w-7xl mx-auto">
      <div class="mb-6 pt-2">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Lëvizjet e Stokut</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Regjistro hyrjet dhe daljet e mallrave</p>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="text-2xl font-bold text-blue-500" id="stat-total">0</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Total Lëvizje</div>
        </div>
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="text-2xl font-bold text-green-500" id="stat-in">0</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Hyrje (IN)</div>
        </div>
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="text-2xl font-bold text-red-500" id="stat-out">0</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Dalje (OUT)</div>
        </div>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800 mb-6">
        <h2 class="font-semibold text-gray-700 dark:text-gray-200 mb-4">➕ Regjistro Lëvizje</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Produkti *</label>
            <input id="f-product" type="text" placeholder="Laptop Dell XPS" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Depoja *</label>
            <input id="f-warehouse" type="text" placeholder="Depo Qendrore" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Lloji *</label>
            <select id="f-type" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="IN">📥 IN — Hyrje</option>
              <option value="OUT">📤 OUT — Dalje</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Sasia *</label>
            <input id="f-quantity" type="number" placeholder="10" min="1" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Arsyeja</label>
            <input id="f-reason" type="text" placeholder="Blerje nga furnitori..." class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
        <button onclick="addMovement()" class="mt-4 px-6 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition-colors">✅ Regjistro</button>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800">
        <h2 class="font-semibold text-gray-700 dark:text-gray-200 mb-4">🔄 Historia e Lëvizjeve</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-800">
                <th class="pb-3 font-medium">Produkti</th>
                <th class="pb-3 font-medium">Depoja</th>
                <th class="pb-3 font-medium">Lloji</th>
                <th class="pb-3 font-medium">Sasia</th>
                <th class="pb-3 font-medium">Arsyeja</th>
                <th class="pb-3 font-medium">Data</th>
                <th class="pb-3 font-medium"></th>
              </tr>
            </thead>
            <tbody id="movBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script src="navbar.js"></script>
  <script>
    renderNavbar('stockmovements');
    const KEY = 'movements';

    function render() {
      const data = lsGet(KEY);
      document.getElementById('stat-total').textContent = data.length;
      document.getElementById('stat-in').textContent = data.filter(m => m.type === 'IN').length;
      document.getElementById('stat-out').textContent = data.filter(m => m.type === 'OUT').length;
      const tbody = document.getElementById('movBody');
      if (data.length === 0) { showEmpty('movBody', 'Nuk ka lëvizje të regjistruara.'); return; }
      tbody.innerHTML = [...data].reverse().map(m => `
        <tr class="border-b border-gray-50 dark:border-gray-800 last:border-0 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
          <td class="py-3 font-medium text-gray-800 dark:text-gray-200">${m.productName}</td>
          <td class="py-3 text-gray-500 dark:text-gray-400">${m.warehouseName}</td>
          <td class="py-3"><span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${m.type === 'IN' ? 'bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400' : 'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400'}">${m.type}</span></td>
          <td class="py-3 font-medium text-gray-800 dark:text-gray-200">${m.quantity}</td>
          <td class="py-3 text-gray-500 dark:text-gray-400">${m.reason || '—'}</td>
          <td class="py-3 text-gray-500 dark:text-gray-400">${formatDate(m.date)}</td>
          <td class="py-3"><button onclick="deleteMov('${m.id}')" class="px-3 py-1.5 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-lg text-xs font-medium hover:bg-red-100 transition-colors">🗑️</button></td>
        </tr>`).join('');
    }

    function addMovement() {
      const productName = document.getElementById('f-product').value.trim();
      const warehouseName = document.getElementById('f-warehouse').value.trim();
      const quantity = document.getElementById('f-quantity').value;
      if (!productName) return showToast('Emri i produktit është i detyrueshëm!', 'error');
      if (!warehouseName) return showToast('Emri i deposes është i detyrueshëm!', 'error');
      if (!quantity || parseInt(quantity) <= 0) return showToast('Sasia duhet të jetë pozitive!', 'error');
      const data = lsGet(KEY);
      data.push({ id: Date.now().toString(), productName, warehouseName, type: document.getElementById('f-type').value, quantity, reason: document.getElementById('f-reason').value, date: new Date().toISOString() });
      lsSet(KEY, data);
      showToast('✅ Lëvizja u regjistrua!', 'success');
      ['f-product','f-warehouse','f-quantity','f-reason'].forEach(id => document.getElementById(id).value = '');
      render();
    }

    function deleteMov(id) {
      confirmDelete('A jeni i sigurt?', () => {
        lsSet(KEY, lsGet(KEY).filter(x => x.id !== id));
        showToast('✅ Lëvizja u fshi!', 'success');
        render();
      });
    }

    render();
  </script>
</body>
</html>
