# Render Blueprint — ndërton SPA-në React në web/ para startit të Backend-it.
# Në dashboard të Render: lidh repo-n dhe importo këtë file, OSE vendos manualisht:
#   Root Directory: Backend
#   Build Command:  npm install && cd ../web && npm install && npm run build
#   Start Command:  npm start

services:
  - type: web
    name: stockflow
    rootDir: Backend
    buildCommand: npm install && cd ../web && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
