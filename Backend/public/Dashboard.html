<!DOCTYPE html>
<html lang="sq" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen transition-colors duration-300">
  <div id="navbar-container"></div>

  <main class="lg:ml-64 pt-16 lg:pt-0 p-6">
    <div class="max-w-7xl mx-auto">

      <!-- Header -->
      <div class="mb-8 pt-2">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Dashboard</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Mirë se vini në StockFlow — Sistemi i Menaxhimit të Inventarit</p>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800 hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-3">
            <div class="w-10 h-10 bg-blue-50 dark:bg-blue-900/30 rounded-xl flex items-center justify-center">
              <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            </div>
            <span class="text-xs font-medium text-green-500 bg-green-50 dark:bg-green-900/20 px-2 py-1 rounded-full">Aktiv</span>
          </div>
          <div class="text-2xl font-bold text-gray-800 dark:text-white" id="stat-products">—</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Produkte Gjithsej</div>
        </div>

        <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800 hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-3">
            <div class="w-10 h-10 bg-green-50 dark:bg-green-900/30 rounded-xl flex items-center justify-center">
              <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <span class="text-xs font-medium text-green-500 bg-green-50 dark:bg-green-900/20 px-2 py-1 rounded-full">€</span>
          </div>
          <div class="text-2xl font-bold text-gray-800 dark:text-white" id="stat-value">—</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Vlera Totale</div>
        </div>

        <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800 hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-3">
            <div class="w-10 h-10 bg-red-50 dark:bg-red-900/30 rounded-xl flex items-center justify-center">
              <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            </div>
            <span class="text-xs font-medium text-red-500 bg-red-50 dark:bg-red-900/20 px-2 py-1 rounded-full">⚠️</span>
          </div>
          <div class="text-2xl font-bold text-gray-800 dark:text-white" id="stat-low">—</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Stok i Ulët</div>
        </div>

        <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800 hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-3">
            <div class="w-10 h-10 bg-purple-50 dark:bg-purple-900/30 rounded-xl flex items-center justify-center">
              <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
            </div>
            <span class="text-xs font-medium text-purple-500 bg-purple-50 dark:bg-purple-900/20 px-2 py-1 rounded-full">#</span>
          </div>
          <div class="text-2xl font-bold text-gray-800 dark:text-white" id="stat-categories">—</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Kategori</div>
        </div>
      </div>

      <!-- Chart + Low Stock -->
      <div class="grid grid-cols-1 xl:grid-cols-2 gap-5 mb-8">
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800">
          <h2 class="font-semibold text-gray-700 dark:text-gray-200 mb-4">Produktet sipas Kategorisë</h2>
          <canvas id="categoryChart" height="200"></canvas>
        </div>

        <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800">
          <h2 class="font-semibold text-gray-700 dark:text-gray-200 mb-4">⚠️ Stok i Ulët</h2>
          <div id="lowStockTable">
            <div class="flex items-center justify-center py-8">
              <div class="animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800 mb-8">
        <h2 class="font-semibold text-gray-700 dark:text-gray-200 mb-4">⚡ Veprime të Shpejta</h2>
        <div class="flex flex-wrap gap-3">
          <a href="products.html" class="flex items-center gap-2 px-4 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Shto Produkt
          </a>
          <a href="stockmovements.html" class="flex items-center gap-2 px-4 py-2.5 bg-green-500 hover:bg-green-600 text-white rounded-xl text-sm font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
            Lëvizjet e Stokut
          </a>
          <a href="orders.html" class="flex items-center gap-2 px-4 py-2.5 bg-purple-500 hover:bg-purple-600 text-white rounded-xl text-sm font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Porositë
          </a>
          <a href="reports.html" class="flex items-center gap-2 px-4 py-2.5 bg-orange-500 hover:bg-orange-600 text-white rounded-xl text-sm font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            Raportet
          </a>
        </div>
      </div>

    </div>
  </main>

  <script src="app.js"></script>
  <script src="navbar.js"></script>
  <script>
    renderNavbar('dashboard');

    let chartInstance = null;

    async function loadDashboard() {
      try {
        const data = await apiGet('/products');
        const products = data.data || [];

        document.getElementById('stat-products').textContent = products.length;
        document.getElementById('stat-value').textContent = formatCurrency(
          products.reduce((s, p) => s + parseFloat(p.price) * parseInt(p.quantity), 0)
        );
        const low = products.filter(p => parseInt(p.quantity) < 5);
        document.getElementById('stat-low').textContent = low.length;
        const cats = [...new Set(products.map(p => p.category))];
        document.getElementById('stat-categories').textContent = cats.length;

        // Low stock table
        const tbody = document.getElementById('lowStockTable');
        if (low.length === 0) {
          tbody.innerHTML = '<p class="text-center text-green-500 py-6 font-medium">✅ Asnjë produkt me stok të ulët!</p>';
        } else {
          tbody.innerHTML = `<div class="overflow-x-auto"><table class="w-full text-sm">
            <thead><tr class="text-left text-gray-500 dark:text-gray-400 border-b dark:border-gray-800">
              <th class="pb-2 font-medium">Emri</th><th class="pb-2 font-medium">SKU</th><th class="pb-2 font-medium">Sasia</th><th class="pb-2 font-medium">Kategoria</th>
            </tr></thead>
            <tbody>${low.map(p => `<tr class="border-b dark:border-gray-800 last:border-0">
              <td class="py-2.5 font-medium text-gray-800 dark:text-gray-200">${p.name}</td>
              <td class="py-2.5 text-gray-500">${p.sku}</td>
              <td class="py-2.5"><span class="px-2 py-0.5 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg font-bold text-xs">${p.quantity}</span></td>
              <td class="py-2.5 text-gray-500">${p.category}</td>
            </tr>`).join('')}</tbody>
          </table></div>`;
        }

        // Chart
        const catData = {};
        products.forEach(p => { catData[p.category] = (catData[p.category] || 0) + 1; });
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(document.getElementById('categoryChart'), {
          type: 'doughnut',
          data: {
            labels: Object.keys(catData),
            datasets: [{ data: Object.values(catData), backgroundColor: ['#3B82F6','#10B981','#8B5CF6','#F59E0B','#EF4444','#06B6D4'], borderWidth: 0 }]
          },
          options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#6B7280', font: { size: 12 } } } } }
        });

      } catch (e) {
        document.getElementById('lowStockTable').innerHTML = '<p class="text-center text-red-500 py-6">❌ Serveri nuk është aktiv! Starto: node src/app.js</p>';
      }
    }

    loadDashboard();
  </script>
</body>
</html>
