<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow — Lëvizjet e Stokut</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f4f8; }
nav { background: #2d3748; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
nav .logo { color: white; font-size: 20px; font-weight: bold; }
nav .links { display: flex; gap: 4px; flex-wrap: wrap; }
nav a { color: #a0aec0; text-decoration: none; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
nav a:hover { background: #4a5568; color: white; }
nav a.active { background: #4299e1; color: white; }
.container { max-width: 960px; margin: 24px auto; padding: 0 16px; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: white; border-radius: 10px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.stat-card .num { font-size: 28px; font-weight: 700; }
.stat-card .lbl { font-size: 13px; color: #718096; margin-top: 4px; }
.card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card h2 { color: #2d3748; margin-bottom: 16px; font-size: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
label { display: block; font-size: 13px; color: #4a5568; margin-bottom: 4px; }
input, select { width: 100%; padding: 9px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; }
input:focus, select:focus { outline: none; border-color: #4299e1; }
.btn { padding: 9px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-blue { background: #4299e1; color: white; width: 100%; margin-top: 12px; }
.btn-red { background: #fc8181; color: #742a2a; padding: 5px 12px; font-size: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { background: #edf2f7; padding: 10px 12px; text-align: left; color: #4a5568; }
td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; }
tr:last-child td { border-bottom: none; }
.badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.badge-green { background: #c6f6d5; color: #276749; }
.badge-red { background: #fed7d7; color: #742a2a; }
.msg { padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 14px; display: none; }
.msg.show { display: block; }
.success { background: #c6f6d5; color: #276749; }
.error { background: #fed7d7; color: #742a2a; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<nav>
<div class="logo">📦 StockFlow</div>
<div class="links">
<a href="Dashboard.html">📊 Dashboard</a>
<a href="Products.html">📦 Produktet</a>
<a href="Warehouses.html">🏭 Depo</a>
<a href="StockMovements.html" class="active">🔄 Lëvizjet</a>
<a href="Suppliers.html">🚚 Furnitorët</a>
<a href="Orders.html">🛒 Porositë</a>
<a href="Customers.html">👥 Klientët</a>
<a href="Reports.html">📈 Raportet</a>
</div>
</nav>

<div class="container">
<div class="stats">
<div class="stat-card">
<div class="num" id="totalMov" style="color:#4299e1">0</div>
<div class="lbl">Total Lëvizje</div>
</div>
<div class="stat-card">
<div class="num" id="totalIN" style="color:#48bb78">0</div>
<div class="lbl">Hyrje (IN)</div>
</div>
<div class="stat-card">
<div class="num" id="totalOUT" style="color:#fc8181">0</div>
<div class="lbl">Dalje (OUT)</div>
</div>
</div>

<div class="card">
<h2>➕ Regjistro Lëvizje</h2>
<div class="msg" id="formMsg"></div>
<div class="form-grid">
<div><label>Produkti *</label><input type="text" id="productName" placeholder="Laptop Dell XPS"></div>
<div><label>Depoja *</label><input type="text" id="warehouseName" placeholder="Depo Qendrore"></div>
<div><label>Lloji *</label>
<select id="type">
<option value="IN">📥 IN — Hyrje</option>
<option value="OUT">📤 OUT — Dalje</option>
</select>
</div>
<div><label>Sasia *</label><input type="number" id="quantity" placeholder="10" min="1"></div>
<div style="grid-column:1/-1"><label>Arsyeja</label><input type="text" id="reason" placeholder="Blerje nga furnitori..."></div>
</div>
<button class="btn btn-blue" onclick="addMovement()">✅ Regjistro</button>
</div>

<div class="card">
<h2>🔄 Historia e Lëvizjeve</h2>
<div class="msg" id="listMsg"></div>
<table>
<thead><tr><th>Produkti</th><th>Depoja</th><th>Lloji</th><th>Sasia</th><th>Arsyeja</th><th>Data</th><th></th></tr></thead>
<tbody id="movList"></tbody>
</table>
</div>
</div>

<script>
const KEY = 'movements';
function getData() { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
function saveData(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function showMsg(id, text, type) {
const el = document.getElementById(id);
el.textContent = text; el.className = 'msg ' + type + ' show';
setTimeout(() => { el.className = 'msg'; }, 3000);
}

function render() {
const data = getData();
document.getElementById('totalMov').textContent = data.length;
document.getElementById('totalIN').textContent = data.filter(m => m.type === 'IN').length;
document.getElementById('totalOUT').textContent = data.filter(m => m.type === 'OUT').length;
const tbody = document.getElementById('movList');
if (data.length === 0) {
tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#a0aec0;padding:20px">Nuk ka lëvizje.</td></tr>';
return;
}
tbody.innerHTML = [...data].reverse().map(m => `<tr>
<td><strong>${m.productName}</strong></td>
<td>${m.warehouseName}</td>
<td><span class="badge ${m.type === 'IN' ? 'badge-green' : 'badge-red'}">${m.type}</span></td>
<td>${m.quantity}</td>
<td>${m.reason || '—'}</td>
<td>${new Date(m.date).toLocaleDateString('sq-AL')}</td>
<td><button class="btn btn-red" onclick="deleteMov('${m.id}')">🗑️</button></td>
</tr>`).join('');
}

function addMovement() {
const productName = document.getElementById('productName').value.trim();
const warehouseName = document.getElementById('warehouseName').value.trim();
const quantity = document.getElementById('quantity').value;
if (!productName) return showMsg('formMsg', '❌ Emri i produktit është i detyrueshëm!', 'error');
if (!warehouseName) return showMsg('formMsg', '❌ Emri i deposes është i detyrueshëm!', 'error');
if (!quantity || quantity <= 0) return showMsg('formMsg', '❌ Sasia duhet të jetë pozitive!', 'error');
const data = getData();
data.push({ id: Date.now().toString(), productName, warehouseName, type: document.getElementById('type').value, quantity, reason: document.getElementById('reason').value, date: new Date().toISOString() });
saveData(data);
showMsg('formMsg', '✅ Lëvizja u regjistrua!', 'success');
['productName','warehouseName','quantity','reason'].forEach(id => document.getElementById(id).value = '');
render();
}

function deleteMov(id) {
if (!confirm('A jeni i sigurt?')) return;
saveData(getData().filter(x => x.id !== id));
showMsg('listMsg', '✅ Lëvizja u fshi!', 'success');
render();
}

render();
</script>
</body>
</html>
