<!DOCTYPE html>
<html lang="sq" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow — Furnitorët</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen transition-colors duration-300">
  <div id="navbar-container"></div>
  <main class="lg:ml-64 pt-16 lg:pt-0 p-6">
    <div class="max-w-7xl mx-auto">
      <div class="mb-6 pt-2">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Furnitorët</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Menaxho furnitorët e sistemit</p>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="text-2xl font-bold text-blue-500" id="stat-total">0</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Total Furnitorë</div>
        </div>
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="text-2xl font-bold text-green-500" id="stat-active">0</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Furnitorë Aktiv</div>
        </div>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800 mb-6">
        <h2 class="font-semibold text-gray-700 dark:text-gray-200 mb-4">➕ Shto Furnitor</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Emri *</label>
            <input id="f-name" type="text" placeholder="TechSupply sh.p.k" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Email *</label>
            <input id="f-email" type="email" placeholder="info@supplier.com" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Telefoni *</label>
            <input id="f-phone" type="text" placeholder="+383 44 000 000" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div class="flex flex-col justify-between">
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Statusi</label>
            <div class="flex items-center gap-2">
              <input id="f-active" type="checkbox" checked class="w-4 h-4 rounded text-blue-500">
              <span class="text-sm text-gray-600 dark:text-gray-400">Aktiv</span>
            </div>
          </div>
        </div>
        <button onclick="addSupplier()" class="mt-4 px-6 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition-colors">✅ Shto Furnitorin</button>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800">
        <h2 class="font-semibold text-gray-700 dark:text-gray-200 mb-4">🚚 Lista e Furnitorëve</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-800">
                <th class="pb-3 font-medium">Emri</th>
                <th class="pb-3 font-medium">Email</th>
                <th class="pb-3 font-medium">Telefoni</th>
                <th class="pb-3 font-medium">Statusi</th>
                <th class="pb-3 font-medium">Veprimet</th>
              </tr>
            </thead>
            <tbody id="supBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div id="editModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl">
      <h2 class="font-semibold text-gray-800 dark:text-white mb-4">✏️ Ndrysho Furnitorin</h2>
      <input type="hidden" id="edit-id">
      <div class="space-y-3">
        <div><label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Emri</label>
          <input id="edit-name" type="text" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div><label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Email</label>
          <input id="edit-email" type="email" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div><label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Telefoni</label>
          <input id="edit-phone" type="text" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div class="flex items-center gap-2">
          <input id="edit-active" type="checkbox" class="w-4 h-4 rounded text-blue-500">
          <label class="text-sm text-gray-600 dark:text-gray-400">Aktiv</label>
        </div>
      </div>
      <div class="flex gap-3 mt-5">
        <button onclick="saveEdit()" class="flex-1 px-4 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition-colors">💾 Ruaj</button>
        <button onclick="closeModal('editModal')" class="flex-1 px-4 py-2.5 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400 rounded-xl text-sm font-semibold transition-colors">✖ Anulo</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="navbar.js"></script>
  <script>
    renderNavbar('suppliers');
    const KEY = 'suppliers';

    function render() {
      const data = lsGet(KEY);
      document.getElementById('stat-total').textContent = data.length;
      document.getElementById('stat-active').textContent = data.filter(s => s.isActive).length;
      const tbody = document.getElementById('supBody');
      if (data.length === 0) { showEmpty('supBody', 'Nuk ka furnitorë.'); return; }
      tbody.innerHTML = data.map(s => `
        <tr class="border-b border-gray-50 dark:border-gray-800 last:border-0 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
          <td class="py-3 font-medium text-gray-800 dark:text-gray-200">${s.name}</td>
          <td class="py-3 text-gray-500 dark:text-gray-400">${s.email}</td>
          <td class="py-3 text-gray-500 dark:text-gray-400">${s.phone}</td>
          <td class="py-3"><span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${s.isActive ? 'bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400' : 'bg-gray-100 dark:bg-gray-800 text-gray-500'}">${s.isActive ? 'Aktiv' : 'Joaktiv'}</span></td>
          <td class="py-3">
            <div class="flex gap-2">
              <button onclick="openEdit('${s.id}')" class="px-3 py-1.5 bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600 dark:text-yellow-400 rounded-lg text-xs font-medium hover:bg-yellow-100 transition-colors">✏️ Ndrysho</button>
              <button onclick="deleteSup('${s.id}')" class="px-3 py-1.5 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-lg text-xs font-medium hover:bg-red-100 transition-colors">🗑️ Fshi</button>
            </div>
          </td>
        </tr>`).join('');
    }

    function addSupplier() {
      const name = document.getElementById('f-name').value.trim();
      const email = document.getElementById('f-email').value.trim();
      const phone = document.getElementById('f-phone').value.trim();
      if (!name) return showToast('Emri është i detyrueshëm!', 'error');
      if (!email) return showToast('Email është i detyrueshëm!', 'error');
      if (!phone) return showToast('Telefoni është i detyrueshëm!', 'error');
      const data = lsGet(KEY);
      data.push({ id: Date.now().toString(), name, email, phone, isActive: document.getElementById('f-active').checked });
      lsSet(KEY, data);
      showToast('✅ Furnitori u shtua!', 'success');
      ['f-name','f-email','f-phone'].forEach(id => document.getElementById(id).value = '');
      render();
    }

    function openEdit(id) {
      const s = lsGet(KEY).find(x => x.id === id);
      document.getElementById('edit-id').value = s.id;
      document.getElementById('edit-name').value = s.name;
      document.getElementById('edit-email').value = s.email;
      document.getElementById('edit-phone').value = s.phone;
      document.getElementById('edit-active').checked = s.isActive;
      openModal('editModal');
    }

    function saveEdit() {
      const id = document.getElementById('edit-id').value;
      const data = lsGet(KEY);
      const i = data.findIndex(x => x.id === id);
      data[i] = { ...data[i], name: document.getElementById('edit-name').value, email: document.getElementById('edit-email').value, phone: document.getElementById('edit-phone').value, isActive: document.getElementById('edit-active').checked };
      lsSet(KEY, data);
      closeModal('editModal');
      showToast('✅ Furnitori u përditësua!', 'success');
      render();
    }

    function deleteSup(id) {
      confirmDelete('A jeni i sigurt?', () => {
        lsSet(KEY, lsGet(KEY).filter(x => x.id !== id));
        showToast('✅ Furnitori u fshi!', 'success');
        render();
      });
    }

    render();
  </script>
</body>
</html>
