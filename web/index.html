<!doctype html>
<html lang="sq">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('stockflow-theme');
          if (t === 'light') document.documentElement.classList.remove('dark');
          else if (t === 'dark') document.documentElement.classList.add('dark');
          else if (localStorage.getItem('darkMode') === 'false')
            document.documentElement.classList.remove('dark');
          else document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockFlow — Neon Cyber</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
